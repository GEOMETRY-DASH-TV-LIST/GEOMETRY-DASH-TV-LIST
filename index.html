<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="lSr6vloc-um6xY8Vdkz9TFdBcyRS-aEkUkUcQNEp2EE" />
    <title>GEOMETRY DASH TV LIST (GDTVL)</title>
    <meta name="description" content="La lista oficial de niveles, récords y noclip de Geometry Dash para Smart TV. Únete al ranking mundial de GDTVL.">
    <meta name="keywords" content="Geometry Dash, GDTVL, Smart TV, Noclip, GD List, Récords, Geometry Dash TV">
    <meta name="author" content="GDTVL Team">

    <style>
        :root {
            --primary: #00d4ff; --accent: #ff4b2b; --gold: #ffd700; --bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.98); --border: #222; --text: #eee;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at top right, #0a1824, #050505);
            min-height: 100vh;
        }

        /* --- UI NAVIGATION --- */
        .top-controls { position: fixed; top: 20px; right: 20px; z-index: 5000; display: flex; gap: 10px; }
        .control-btn { 
            background: rgba(10, 10, 10, 0.9); padding: 12px 18px; border-radius: 8px; 
            border: 1px solid var(--primary); cursor: pointer; color: var(--primary); 
            font-weight: 900; backdrop-filter: blur(15px); text-transform: uppercase; font-size: 0.75rem;
        }

        /* BUSCADOR */
        .search-container { margin-bottom: 20px; width: 100%; }
        .search-bar {
            width: 100%; padding: 12px; background: #111; border: 1px solid var(--border);
            border-radius: 8px; color: white; outline: none; transition: 0.3s; font-size: 0.9rem;
        }
        .search-bar:focus { border-color: var(--primary); }

        #side-menu { 
            height: 100%; width: 0; position: fixed; z-index: 4000; top: 0; right: 0; 
            background: rgba(2, 2, 2, 0.99); transition: 0.4s; overflow-x: hidden; 
            padding-top: 100px; border-left: 2px solid var(--primary); 
        }
        #side-menu a { padding: 15px 30px; text-decoration: none; font-size: 1rem; color: #666; display: block; border-bottom: 1px solid #111; transition: 0.3s; }
        #side-menu a:hover { color: var(--primary); background: rgba(0, 212, 255, 0.05); }
        .highlight { color: var(--gold) !important; font-weight: bold; }

        .section { display: none; padding: 100px 20px; max-width: 900px; margin: auto; animation: fadeIn 0.5s; }
        .section-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* --- CARDS & LISTS --- */
        .card { 
            background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 10px; 
            border: 1px solid var(--border); display: flex; align-items: center; cursor: pointer;
        }
        .rank { font-size: 24px; font-weight: 900; opacity: 0.2; width: 60px; }
        .pts-tag { color: var(--primary); font-weight: bold; margin-left: auto; }

        /* --- RULES DOCUMENT --- */
        .rules-doc { background: #080808; border: 1px solid #333; padding: 40px; border-radius: 15px; line-height: 1.6; }
        .rule-block { margin-bottom: 30px; }
        .rule-block h3 { color: var(--accent); margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .device-list { background: #111; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 3px solid var(--primary); }
        .exception-box { background: rgba(0, 212, 255, 0.1); border: 1px solid var(--primary); padding: 20px; border-radius: 10px; margin: 20px 0; }

        /* --- PLAYER RANKING --- */
        .player-card { background: #0d0d0d; padding: 15px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #1a1a1a; }
        .p-bar-bg { background: #222; height: 10px; width: 100%; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .p-bar-fill { background: linear-gradient(90deg, var(--primary), #0077ff); height: 100%; transition: 1.5s ease-out; }

        /* --- MODAL --- */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 6000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #0a0a0a; width: 90%; max-width: 500px; padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body>

    <div class="top-controls">
        <div class="control-btn" onclick="toggleLanguage()" id="lang-btn">ESP</div>
        <div class="control-btn" onclick="toggleMenu()">MENU ☰</div>
    </div>

    <nav id="side-menu">
        <a href="#" onclick="showSection('inicio')" id="n-top"></a>
        <a href="#" onclick="showSection('noclip')" id="n-noclip"></a>
        <a href="#" onclick="showSection('jugadores')" id="n-players"></a>
        <a href="#" onclick="showSection('reglas')" id="n-rules" style="color:var(--accent)"></a>
        <a href="https://forms.gle/52ifAHg4i1yG4tye8" target="_blank" class="highlight" id="n-submit"></a>
    </nav>

    <div id="inicio" class="section section-active">
        <h1 id="h-top" style="text-align:center; margin-bottom:20px;"></h1>
        <div class="search-container"><input type="text" id="search-main" class="search-bar" oninput="renderAll()" placeholder="Buscar nivel..."></div>
        <div id="list-main"></div>
    </div>

    <div id="noclip" class="section">
        <h1 id="h-noclip" style="text-align:center; margin-bottom:20px;"></h1>
        <div class="search-container"><input type="text" id="search-noclip" class="search-bar" oninput="renderAll()" placeholder="Buscar nivel..."></div>
        <div id="list-noclip"></div>
    </div>

    <div id="jugadores" class="section">
        <h1 id="h-ranking" style="text-align:center; margin-bottom:20px;"></h1>
        <div class="search-container"><input type="text" id="search-players" class="search-bar" oninput="renderAll()" placeholder="Buscar jugador..."></div>
        <div id="list-players"></div>
    </div>

    <div id="reglas" class="section">
        <div class="rules-doc">
            <h2 id="r-title" style="color:var(--primary); margin-bottom:30px; text-align:center;">GDTVL CONSTITUTION</h2>
            <div id="rules-content"></div>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeDetails()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="m-title" style="color:var(--gold);"></h2>
            <p id="m-creator" style="color:#666; margin-bottom:20px;"></p>
            <div id="m-victors" style="background:#000; padding:15px; border-radius:10px; text-align:left;"></div>
            <a id="m-video" href="#" target="_blank" style="display:block; background:var(--accent); color:white; padding:15px; margin-top:20px; text-decoration:none; border-radius:10px; font-weight:bold;"></a>
        </div>
    </div>

    <script>
        let nivelesMain = [
            { nombre: "NIVEL EJEMPLO", creador: "CREADOR EJEMPLO", puntos: 0, link: "#", records: [] },
        ];

        let nivelesNoclip = [
            { nombre: "NIVEL EJEMPLO NOCLIP", creador: "CREADOR EJEMPLO", acc: 0, link: "#", records: [] },
        ];

        let jugadoresData = [
            { nombre: "NOMBRE JUGADOR", puntos: 0 },
        ];

        for(let i=nivelesMain.length+1; i<=75; i++) nivelesMain.push({ nombre: `MAIN SLOT #${i}`, creador: "VACANTE", puntos: 0, link: "#", records: [] });
        for(let i=nivelesNoclip.length+1; i<=75; i++) nivelesNoclip.push({ nombre: `NOCLIP SLOT #${i}`, creador: "VACANTE", acc: 0, link: "#", records: [] });
        for(let i=jugadoresData.length+1; i<=100; i++) jugadoresData.push({ nombre: `PLAYER SLOT #${i}`, puntos: 0 });

        let currentLang = 'es';

        const i18n = {
            es: {
                n_top: "🏆 TOP 75 MAIN", n_noclip: "🎬 TOP 75 NOCLIP", n_players: "👥 TOP 100 JUGADORES", n_rules: "⚖️ REGLAMENTO TÉCNICO", n_submit: "📝 SUBIR RÉCORD",
                h_top: "GDTVL MAIN LIST", h_noclip: "GDTVL NOCLIP LIST", h_ranking: "WORLD RANKING", r_title: "CONSTITUCIÓN TÉCNICA DE GDTVL",
                m_btn: "VER PRUEBA", by: "POR", pts: "PTS",
                rules: `
                <div class="rule-block"><h3>1. HARDWARE</h3><p>Solo se permiten Smart TVs o dispositivos (TV Box/Consolas) conectados a una TV física. Prohibido el uso de monitores de PC.</p></div>
                <div class="rule-block"><h3>2. INSTALACIÓN</h3><p>El juego debe estar instalado localmente mediante APK, Sideloading o tiendas oficiales del dispositivo.</p></div>
                <div class="rule-block"><h3>3. PROHIBICIÓN DE MIRRORING</h3><p>El uso de Casting/Mirroring o duplicación de pantalla desde móviles/PC está estrictamente prohibido debido al input lag artificial.</p></div>
                <div class="rule-block"><h3>4. REGLA DE ORO (Hz)</h3><div class="exception-box">Si un nivel es imposible en 60Hz/120Hz nativos de TV, se autoriza el uso de FPS Bypass o Click Between Frames (CBF).</div></div>
                <div class="rule-block"><h3>5. EVIDENCIA</h3><p>El video debe mostrar el nivel completo. Es obligatorio que se escuche el audio y, de ser posible, los clics físicos.</p></div>
                <div class="rule-block"><h3>6. HUD REQUERIDO</h3><p>Para la Noclip List, el contador de Accuracy debe ser visible en todo momento durante el récord.</p></div>
                <div class="rule-block"><h3>7. ASCENSO</h3><p>Cualquier récord de Noclip con 100% de precisión será revisado para su ascenso automático a la Main List.</p></div>
                <div class="rule-block"><h3>8. FPS LIMITS</h3><p>No hay límite de FPS mientras se use el hardware permitido, siempre que el juego sea estable y no se use Speedhack.</p></div>
                <div class="rule-block"><h3>9. MODS ADMITIDOS</h3><p>Solo se admiten mods cosméticos o de rendimiento (como CBF). Cualquier mod que altere la física para facilitar el nivel resultará en ban.</p></div>
                <div class="rule-block"><h3>10. VERIFICACIÓN</h3><p>El equipo de GDTVL se reserva el derecho de pedir una prueba de manos (Handcam) si el récord es sospechoso.</p></div>`
            },
            en: {
                n_top: "🏆 TOP 75 MAIN", n_noclip: "🎬 TOP 75 NOCLIP", n_players: "👥 TOP 100 PLAYERS", n_rules: "⚖️ TECHNICAL RULES", n_submit: "📝 SUBMIT RECORD",
                h_top: "GDTVL MAIN LIST", h_noclip: "GDTVL NOCLIP LIST", h_ranking: "WORLD RANKING", r_title: "GDTVL TECHNICAL CONSTITUTION",
                m_btn: "WATCH PROOF", by: "BY", pts: "PTS",
                rules: `
                <div class="rule-block"><h3>1. HARDWARE</h3><p>Only Smart TVs or devices (TV Box/Consoles) connected to a physical TV are allowed. PC monitors are banned.</p></div>
                <div class="rule-block"><h3>2. INSTALLATION</h3><p>Game must be locally installed via APK, Sideloading, or official stores.</p></div>
                <div class="rule-block"><h3>3. NO MIRRORING</h3><p>Screen mirroring/casting from mobile/PC is strictly banned due to latency.</p></div>
                <div class="rule-block"><h3>4. GOLDEN RULE (Hz)</h3><div class="exception-box">If a level is impossible on native 60Hz/120Hz, FPS Bypass or CBF is authorized.</div></div>
                <div class="rule-block"><h3>5. EVIDENCE</h3><p>Video must show full completion. Game audio and physical clicks are highly recommended.</p></div>
                <div class="rule-block"><h3>6. REQUIRED HUD</h3><p>For Noclip List, the Accuracy counter must be visible at all times.</p></div>
                <div class="rule-block"><h3>7. ASCENSION</h3><p>Any 100% Accuracy Noclip record will be reviewed for automatic promotion to Main List.</p></div>
                <div class="rule-block"><h3>8. FPS LIMITS</h3><p>No FPS limit as long as hardware is compliant and no Speedhack is used.</p></div>
                <div class="rule-block"><h3>9. ALLOWED MODS</h3><p>Only cosmetic or performance mods (like CBF) are allowed. Physics-altering mods lead to a ban.</p></div>
                <div class="rule-block"><h3>10. VERIFICATION</h3><p>Handcam proof may be requested for suspicious records.</p></div>`
            },
            ru: {
                n_top: "🏆 ТОП 75 MAIN", n_noclip: "🎬 ТОП 75 NOCLIP", n_players: "👥 ТОП 100 ИГРОКОВ", n_rules: "⚖️ ПРАВИЛА", n_submit: "📝 РЕКОРД",
                h_top: "GDTVL MAIN LIST", h_noclip: "GDTVL NOCLIP LIST", h_ranking: "WORLD RANKING", r_title: "GDTVL КОНСТИТУЦИЯ",
                m_btn: "СМОТРЕТЬ", by: "ОТ", pts: "ОЧКОВ",
                rules: `
                <div class="rule-block"><h3>1. ОБОРУДОВАНИЕ</h3><p>Только Smart TV или приставки, подключенные к ТВ. Мониторы ПК запрещены.</p></div>
                <div class="rule-block"><h3>2. УСТАНОВКА</h3><p>Игра должна быть установлена локально через APK или официальные магазины.</p></div>
                <div class="rule-block"><h3>3. НЕТ ТРАНСЛЯЦИЯМ</h3><p>Зеркалирование экрана с телефона запрещено из-за задержки.</p></div>
                <div class="rule-block"><h3>4. ЗОЛОТОЕ ПРАВИЛО</h3><div class="exception-box">Если уровень невозможен на 60/120 Гц, разрешен FPS Bypass или CBF.</div></div>
                <div class="rule-block"><h3>5. ДОКАЗАТЕЛЬСТВА</h3><p>Видео должно быть полным, с игровым аудио.</p></div>
                <div class="rule-block"><h3>6. HUD</h3><p>Для Noclip List счетчик точности должен быть виден всегда.</p></div>
                <div class="rule-block"><h3>7. ПОДЪЕМ</h3><p>100% точность в Noclip дает право на переход в Main List.</p></div>
                <div class="rule-block"><h3>8. FPS</h3><p>Ограничений по FPS нет, если не используется Speedhack.</p></div>
                <div class="rule-block"><h3>9. МОДЫ</h3><p>Разрешены только косметические моды и CBF.</p></div>
                <div class="rule-block"><h3>10. ПРОВЕРКА</h3><p>Мы можем запросить Handcam для проверки рекорда.</p></div>`
            }
        };

        function renderAll() {
            const t = i18n[currentLang];
            const qMain = document.getElementById('search-main').value.toLowerCase();
            const qNoclip = document.getElementById('search-noclip').value.toLowerCase();
            const qPlayers = document.getElementById('search-players').value.toLowerCase();
            
            // UI Text
            document.getElementById('n-top').innerText = t.n_top;
            document.getElementById('n-noclip').innerText = t.n_noclip;
            document.getElementById('n-players').innerText = t.n_players;
            document.getElementById('n-rules').innerText = t.n_rules;
            document.getElementById('n-submit').innerText = t.n_submit;
            document.getElementById('h-top').innerText = t.h_top;
            document.getElementById('h-noclip').innerText = t.h_noclip;
            document.getElementById('h-ranking').innerText = t.h_ranking;
            document.getElementById('r-title').innerText = t.r_title;
            document.getElementById('rules-content').innerHTML = t.rules;

            // Render Lists
            const mainDiv = document.getElementById('list-main');
            mainDiv.innerHTML = "";
            nivelesMain.filter(l => l.nombre.toLowerCase().includes(qMain)).sort((a,b)=>b.puntos-a.puntos).slice(0,75).forEach((l,i)=>{
                mainDiv.innerHTML += `<div class="card" onclick='openLevel(${JSON.stringify(l)})'><div class="rank">#${i+1}</div><div style="flex-grow:1"><b>${l.nombre}</b><br><small>${l.creador}</small></div><div class="pts-tag">${l.puntos} ${t.pts}</div></div>`;
            });

            const noclipDiv = document.getElementById('list-noclip');
            noclipDiv.innerHTML = "";
            nivelesNoclip.filter(l => l.nombre.toLowerCase().includes(qNoclip)).sort((a,b)=>b.acc-a.acc).slice(0,75).forEach((l,i)=>{
                noclipDiv.innerHTML += `<div class="card" onclick='openLevel(${JSON.stringify(l)})'><div class="rank">#${i+1}</div><div style="flex-grow:1"><b>${l.nombre}</b><br><small>${l.creador}</small></div><div class="pts-tag">${l.acc}%</div></div>`;
            });

            const playerDiv = document.getElementById('list-players');
            playerDiv.innerHTML = "";
            const max = Math.max(...jugadoresData.map(p=>p.puntos)) || 1;
            jugadoresData.filter(p => p.nombre.toLowerCase().includes(qPlayers)).sort((a,b)=>b.puntos-a.puntos).slice(0,100).forEach((p,i)=>{
                playerDiv.innerHTML += `<div class="player-card"><div><b>#${i+1}</b> ${p.nombre} - ${p.puntos} ${t.pts}</div><div class="p-bar-bg"><div class="p-bar-fill" style="width:${(p.puntos/max)*100}%"></div></div></div>`;
            });
        }

        function toggleLanguage() {
            if(currentLang === 'es') currentLang = 'en';
            else if(currentLang === 'en') currentLang = 'ru';
            else currentLang = 'es';
            document.getElementById('lang-btn').innerText = currentLang.toUpperCase();
            renderAll();
        }

        function openLevel(l) {
            document.getElementById('m-title').innerText = l.nombre;
            document.getElementById('m-creator').innerText = `${i18n[currentLang].by} ${l.creador}`;
            document.getElementById('m-video').innerText = i18n[currentLang].m_btn;
            document.getElementById('m-video').href = l.link;
            document.getElementById('m-victors').innerHTML = l.records.map(r=>`<div>👤 ${r.p} <span style="float:right; color:var(--primary)">${r.v}</span></div>`).join('') || "No Records";
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeDetails() { document.getElementById('modal-overlay').style.display = 'none'; }
        function toggleMenu() { const m = document.getElementById("side-menu"); m.style.width = (m.style.width === "300px") ? "0" : "300px"; }
        function showSection(id) { 
            document.querySelectorAll('.section').forEach(s=>s.classList.remove('section-active')); 
            document.getElementById(id).classList.add('section-active');
            toggleMenu(); window.scrollTo(0,0);
        }

        window.onload = renderAll;
    </script>
</body>
</html>
